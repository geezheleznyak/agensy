# system-model-schema.yaml
# Canonical schema for the Vault System Model Layer — v0.6
# Per-vault [vault]/system-model.yaml files extend this file via `extends:`.
# Vocabulary frozen from the Phase 0 primitive-discovery experiment
# (see framework/system-model/primitives-experiment.md, 2026-04-20).
# v0.2 / v0.3 / v0.4 / v0.5 / v0.6 are all additive; v0.1–v0.5 YAMLs remain
# parseable. v0.6 RELOCATES cross_vault_bindings out of per-vault YAMLs into a
# central file at agensy/cross-vault-bindings.yaml — see
# framework/system-model/cross-vault-bindings-schema.yaml. v0.6 vaults SHOULD
# omit cross_vault_bindings: from their system-model.yaml; pre-v0.6 vaults that
# still carry a section remain valid (the audit script ignores it once a
# bridge_id is owned by the central file).

schema:
  name: vault-system-model
  version: "0.6"
  created: 2026-04-20
  updated: 2026-04-28
  source_experiment: framework/system-model/primitives-experiment.md
  v0_2_motivation: >
    Closure gates from Phase 2 (politeia) and Phase 4 (oeconomia+bellum) identified four
    caveats that v0.1 did not capture: (1) patterns span wildly different timescales
    so cross-vault queries were category-blind; (2) `reflexivity` conflated ≥4
    mechanically distinct sub-types observed across vaults; (3) accumulation and
    path_dependence have fuzzy boundaries with genuinely dual cases; (4) bindings
    were hand-asserted with no mechanism check. v0.2 adds optional fields to address
    1–3 and extends /system-audit to address 4.
  v0_3_motivation: >
    The Learner Layer (framework/principles/learner-layer-architecture.md, 2026-04-24)
    needs per-node user-traversal annotation so /what-next can do readiness checks
    and /curriculum (Phase C) can identify the boundary between mastered and
    unmastered concepts. v0.3 adds two optional fields (`user_engagement` enum,
    `last_engaged` date) to nodes AND patterns. Sparse by default — annotate
    only nodes the user has actually engaged with. Default is implicitly `unseen`;
    do not pre-fill the YAML with `unseen` markers.
  v0_4_motivation: >
    Phase 5b historia audit (2026-04-26) surfaced 33 binding type-mismatches against
    the four fully-bootstrapped peer vaults. Investigation revealed a category
    error in the v0.1 cross_vault_bindings design: "bridges" in
    cross-vault-bridges.md are concept-level SUBSTRATE overlaps ("how each vault
    treats institutions / complexity / political economy"), but /system-audit
    Step 5b treated every paired-pattern combination as a MECHANISM alignment
    claim. The two are different kinds of cross-vault relation; conflating them
    produced a high false-positive rate (~33% of pattern cross-products) when
    audited against bootstrapped peers.

    v0.4 disambiguates by adding `mechanism_pairings[]` to cross_vault_bindings
    entries — an EXPLICIT list of (local_pattern, peer_vault.peer_pattern)
    tuples where mechanism alignment IS being claimed. /system-audit Step 5b
    only fires on declared mechanism_pairings. Cross-products of
    local_patterns × paired_with[v].patterns NOT in mechanism_pairings are
    treated as implicit substrate overlap and not flagged. /system-audit
    Step 9 dirt-level rule updated: only mechanism_pairings failures count
    toward the type-mismatch trigger.

    All v0.1-v0.3 yamls remain valid (mechanism_pairings is optional). Migration
    is purely additive: identify the few genuine mechanism alignments, annotate
    them. Bindings without explicit mechanism claims produce zero false-positive
    type-mismatches; bindings WITH explicit claims get strict mechanism
    validation (the original v0.2 intent applied where it actually applies).

    The asymmetry — substrate overlap is the rule, mechanism alignment is the
    rare exception — matches what cross-vault-bridges.md actually documents.
    Closure record: framework/closures/v0.4-binding-kinds.md.
  v0_5_motivation: >
    Audit (2026-04-28) of cross_vault_bindings across the five fully-
    bootstrapped vaults (theoria 1260 / oeconomia 2087 / politeia 1143 / historia 1202
    / bellum 1101 lines, ~6800 total / ~40K tokens) showed that ~60-70% of
    `paired_with[peer].nodes` entries duplicate data already present as
    `local_nodes` in the peer's own binding for the same bridge_id. Beyond
    bloat, the duplication is a drift vector: a node renamed in oeconomia must
    be tracked down and rewritten in theoria/politeia/bellum/historia's paired_with
    blocks. The audit also surfaced a quality bug — vaults can claim peer
    contributions that the peer has not ratified with its own binding entry.

    v0.5 deprecates `paired_with` (still optional, still parseable for
    v0.1-v0.4 vaults). The audit script computes effective paired_with
    on-the-fly from each peer vault's local_nodes / local_patterns for
    the matching bridge_id. JSON output surfaces it under a new
    informational field `paired_with_derived`. A new informational
    warning class `paired_with_unratified` fires when a vault's explicit
    paired_with claims a peer node/pattern that the peer's own binding
    for that bridge_id does not declare — surfaces (does not fix) the
    "claim without ratification" quality bug. Does NOT contribute to
    dirt level.

    Backward compatibility: vaults at schema_version <= 0.4 keep
    paired_with and validate exactly as before. Vaults at 0.5 SHOULD
    omit it; if they retain it, the cross-check between explicit and
    derived runs and surfaces unratified claims. Closure record:
    framework/closures/v0.5-paired-with-derivation.md.
  v0_6_motivation: >
    The 2026-04-28 root-cause investigation of v0.5's "unratified" claims
    confirmed zero genuine drift errors across 105 cross-vault claims —
    every existing peer claim corresponds to a real concept in the claimed
    peer's vault. The asymmetry was authoring-sequence artifact (37 cases
    of peer-not-yet-ratified) plus genuinely complementary perspectives on
    bridge scope (18 cases). With zero Cause C errors, v0.6 ships the
    architectural cleanup the user proposed alongside v0.5: relocate
    cross-vault bindings out of per-vault system-model.yaml files into a
    single central file at agensy/cross-vault-bindings.yaml.

    Per-vault YAMLs at schema_version 0.6 carry only nodes / edges /
    patterns. The central file uses a `self_declared` + `peer_views`
    structure that preserves both the vault's own claimed contribution
    and the complementary perspectives peer vaults hold — eliminating
    the unratified-claim asymmetry as a structural surface (it was a
    visibility kludge for what is actually multi-perspective data).

    /system-audit reads the central file and validates IDs against the
    subject vault's nodes/patterns. Five v0.5 informational classes
    (paired_with_unratified, claims_about_me, bindings_safe_to_strip,
    bindings_selectivity_loss, bindings_mixed) collapse into a single
    informational class `unratified_peer_views`. Derivation logic is
    retired — the explicit central file makes it unnecessary.

    Backward compatibility: pre-v0.6 vaults that still carry a
    `cross_vault_bindings:` section continue to parse; the audit script
    prefers the central file when a bridge appears there. The migration
    is a one-shot: tools/consolidate-bindings.py extracts every existing
    binding into the central file; vaults strip their sections and bump
    schema_version to 0.6. Closure record:
    framework/closures/v0.6-centralized-bindings.md.

    Two schemas now travel together: this file (per-vault structure) and
    framework/system-model/cross-vault-bindings-schema.yaml (central file
    structure).

# ─────────────────────────────────────────────────────────────
# NODE VOCABULARY — 6 categories
# Each node belongs to exactly one category.
# Categories partition the ontology — not types but kinds of thing.
# ─────────────────────────────────────────────────────────────
node_categories:
  agents:       "Loci of decision/action with interests."
  states:       "Conditions persisting until changed (stocks)."
  flows:        "Rates of change of states."
  signals:      "Information carrying content between agents/states."
  constraints:  "Boundaries that foreclose possibilities."
  structures:   "Persistent configurations of roles and relations."

# ─────────────────────────────────────────────────────────────
# NODE REQUIRED FIELDS
# ─────────────────────────────────────────────────────────────
node_required_fields:
  - id                      # Unique within vault. Lowercase, snake_case.
  - label                   # Human-readable name.
  - category                # One of node_categories.
  - domain                  # Must exist in vault-config.md domains[].slug.
  - engagement_positions    # List from vault-config engagement_axis.positions.
  - linked_notes            # List of note paths relative to vault root.

node_optional_fields:
  - theorists               # Theorists whose maps discuss this node.
  - related_nodes           # Cross-references within the vault.
  - quality                 # v0.3 candidate: uncertainty/confidence attribute.
  - notes                   # Free-text clarification.
  - timescale               # (v0.2, flows only) — see timescale_bands below.
  - user_engagement         # (v0.3) — see user_engagement_states below. Sparse.
  - last_engaged            # (v0.3) — YYYY-MM-DD. Required if user_engagement is set.

# ─────────────────────────────────────────────────────────────
# EDGE VOCABULARY — 5 core + 5 reserve
# Edges connect two nodes with a typed, directed relation.
# ─────────────────────────────────────────────────────────────
edge_types:
  # Core set — empirically dominant across all three Phase 0 decompositions.
  produces:    "`from` generates or causes `to`."
  reinforces:  "`from` amplifies or stabilizes `to`."
  dampens:     "`from` suppresses or reduces `to`."
  gates:       "`from` is a threshold/condition that enables or blocks `to`."
  couples:     "`from` makes `to` dependent on a third element."
  # Reserve set — plausibly real; retained pending broader corpus evidence.
  consumes:    "`from` depletes or transforms `to`."
  reveals:     "`from` makes `to` observable."
  conceals:    "`from` hides or obfuscates `to`."
  requires:    "`from` depends on `to` for its operation."
  opposes:     "`from` and `to` are in structural antagonism."

edge_required_fields:
  - id                      # Unique within vault. For reference from patterns.
  - from                    # Node id.
  - to                      # Node id.
  - type                    # One of edge_types.
  - linked_notes            # Notes that discuss this edge. May be empty.

edge_optional_fields:
  - weight                  # v0.3 candidate: edge strength/certainty.
  - conditions              # Scope conditions under which the edge applies.

# ─────────────────────────────────────────────────────────────
# PATTERN VOCABULARY — 7 types
# Patterns are dynamical shapes instantiated by subgraphs (nodes + edges).
# The pattern layer is what enables cross-vault composition:
# the same pattern type in two vaults, with different local nodes,
# is the coupling unit for cross_vault_bindings.
# ─────────────────────────────────────────────────────────────
pattern_types:
  positive_feedback:  "Self-amplifying loop — output reinforces input."
  negative_feedback:  "Self-limiting loop — output dampens input."
  threshold:          "Sudden qualitative transition at a critical value."
  reflexivity:        "System's model of itself affects the system."
  selection:          "Differential persistence of competing units."
  accumulation:       "Stock grows without a balancing release."
  path_dependence:    "History constrains present options."

pattern_required_fields:
  - id                      # Unique within vault. Lowercase, snake_case.
  - type                    # One of pattern_types.
  - subgraph                # { nodes: [node_id...], edges: [edge_id...] }
  - linked_notes            # Notes that analyze this pattern instance.

pattern_optional_fields:
  - theorists               # Theorists whose maps discuss this pattern.
  - description             # Natural-language characterization.
  - timescale               # (v0.2) — see timescale_bands below.
  - subtype                 # (v0.2) — free-string sub-classification. Emergent.
  - secondary_types         # (v0.2) — additional pattern_types this instance also exhibits.
  - domain                  # (v0.2, observational) — many vault models already set this.
  - user_engagement         # (v0.3) — see user_engagement_states below. Sparse.
  - last_engaged            # (v0.3) — YYYY-MM-DD. Required if user_engagement is set.

# ─────────────────────────────────────────────────────────────
# TIMESCALE BANDS (v0.2) — six coarse buckets
# Applied optionally to patterns (dynamical shape) and flows (rates).
# Coarse by design — fine-grained timescales invite false precision
# while providing no additional cross-vault query power.
# ─────────────────────────────────────────────────────────────
timescale_bands:
  seconds-to-minutes:  "Combat tempo, conversational signaling, micro-market price formation."
  hours-to-days:       "Operational tempo, news cycles, short-run market reactions."
  weeks-to-months:     "Campaign horizons, business cycles, policy-response cycles."
  years:               "Electoral cycles, regime consolidation, technology adoption S-curves."
  decades+:            "Institutional lock-in, demographic transition, civilizational shifts."
  mixed:               "Genuinely spans multiple bands — explicit acknowledgment, not a default."

# Convention: use `mixed` only when the pattern's mechanism operates across bands.
# Prefer the slowest band over `mixed` when one band dominates.

# ─────────────────────────────────────────────────────────────
# SECONDARY TYPES (v0.2) — dual-mechanism patterns
# Use for patterns that genuinely exhibit two pattern_types (e.g., capital
# accumulation that also forecloses future options is both `accumulation` and
# `path_dependence`). Primary `type` is authoritative; `secondary_types` surface
# the pattern in additional queries.
# ─────────────────────────────────────────────────────────────
secondary_types_rule:
  - "A pattern's primary `type` is authoritative — used for the pattern count and default query."
  - "`secondary_types` is an OPTIONAL array of other pattern_types this instance also exhibits."
  - "Use sparingly. If every pattern looks dual, the primary vocabulary is too vague."
  - "A secondary_types tag must be justified by the same subgraph — do not add a type whose mechanism isn't in the subgraph."

# ─────────────────────────────────────────────────────────────
# USER ENGAGEMENT STATES (v0.3) — four-state mastery ladder
# Per-node and per-pattern annotation of the user's traversal of this concept.
# Sparse by default — annotate only nodes/patterns the user has actually
# engaged with. Default for unannotated entries is implicitly `unseen`;
# do NOT pre-fill the YAML with `unseen` markers.
# Used by /what-next (readiness check), /positions (mastery annotation),
# and /curriculum + /teach + /recall (Phase C).
# Canonical declaration: framework/principles/learner-layer-architecture.md
# ─────────────────────────────────────────────────────────────
user_engagement_states:
  unseen:    "Node exists in domain model; user has not engaged with the concept."
  surfaced:  "User encountered in dialogue or note; no working understanding yet."
  applied:   "User has used the concept in their own writing or argument."
  mastered:  "User can teach it, contest it, extend it."

# Convention: state transitions are normally monotonic upward
# (unseen → surfaced → applied → mastered). Downward transitions are allowed
# (mastery decays) but should be annotated with a brief rationale in `notes`.
# Expected steady-state annotation density: 10–30% of nodes, NOT 100%.

# ─────────────────────────────────────────────────────────────
# CROSS-VAULT BINDINGS (RELOCATED IN v0.6)
# v0.1-v0.5: bindings lived in [vault]/system-model.yaml under
#   `cross_vault_bindings:`. The shape was:
#     - bridge_id, local_nodes, local_patterns, paired_with (v0.5 deprecated),
#       mechanism_pairings, linked_notes
# v0.6: bindings live in agensy/cross-vault-bindings.yaml, governed
#   by framework/system-model/cross-vault-bindings-schema.yaml. v0.6 vaults
#   SHOULD omit `cross_vault_bindings:` from their system-model.yaml.
# Pre-v0.6 vaults that still carry a section remain parseable for backward
# compatibility, but the audit prefers the central file when a bridge_id
# appears there. The fields below are kept ONLY to validate residual pre-v0.6
# data; do not author new entries here.
# ─────────────────────────────────────────────────────────────
cross_vault_bindings_required_fields:
  - bridge_id               # Must exist in agensy/cross-vault-bridges.md.
  - local_nodes             # List of node ids in this vault. (Pre-v0.6 only.)

cross_vault_bindings_optional_fields:
  - local_patterns          # List of pattern ids on this side of the bridge.
  - notes                   # Free-text characterization of the binding.
  - mechanism_pairings      # (v0.4) — see mechanism_pairings_schema below.
                            # In v0.6, mechanism_pairings live in the central
                            # file with explicit `claimer:` attribution.
  - paired_with             # (DEPRECATED in v0.5; OBSOLETE in v0.6 —
                            # the central file's peer_views structure replaces
                            # it. Still parseable in residual pre-v0.6 data.)

# ─────────────────────────────────────────────────────────────
# MECHANISM PAIRINGS (v0.4; relocated in v0.6)
# Substrate overlap is the DEFAULT semantics of a cross_vault_bindings entry:
# the binding asserts that two or more vaults share a topic substrate
# (institutions, complexity, political economy), each through its own
# discipline-specific mechanism. Substrate overlap does NOT require the local
# patterns and peer patterns to share a pattern type.
#
# A `mechanism_pairings[]` entry inside a binding is an EXPLICIT additional
# assertion: this specific (local_pattern, peer_vault.peer_pattern) tuple
# shares a mechanism (pattern type, ideally subtype + timescale) — not just a
# substrate. /system-audit Step 5b validates only declared mechanism_pairings.
# Absence of mechanism_pairings on a binding is the right default for most
# bindings; it accurately reflects substrate-only cross-vault relationship.
#
# Use mechanism_pairings sparingly. The point is to document genuine cross-
# vault mechanism instances (e.g., the four-vault `target-erosion` reflexivity
# subtype) and let the audit validate the claim. Inflating mechanism_pairings
# with weak or aspirational pairings re-introduces the v0.1-v0.3 false-positive
# problem in the opposite direction (now self-inflicted).
# ─────────────────────────────────────────────────────────────
mechanism_pairings_schema:
  required_fields:
    - local                 # local pattern id (must exist in this vault's patterns[])
    - peers                 # list of "<peer_vault>.<peer_pattern_id>" strings
  optional_fields:
    - rationale             # one-line natural-language note on the alignment
  semantics: >
    For each declared (local, peer) tuple: the local pattern and peer pattern
    are claimed to instantiate the same dynamical mechanism. /system-audit
    Step 5b validates this claim by comparing pattern type, subtype, and
    timescale. Type mismatch (without secondary_types escape) is a hard
    failure. Subtype/timescale divergence is informational.

# ─────────────────────────────────────────────────────────────
# EXTENSIBILITY
# Per-vault extensions are allowed and vault-scoped.
# Schema-level additions (new categories, edge types, pattern types)
# are reserved for v0.3 after broader corpus evidence accumulates.
# ─────────────────────────────────────────────────────────────
extensibility:
  per_vault_extensions:
    allowed: true
    scope: "vault-local only; not binding across cross_vault_bindings"
    mechanism: "Declare under an `extensions:` block in the vault's system-model.yaml"
  schema_level_additions:
    allowed: false
    note: "v0.2 candidates that shipped: timescale, subtype, secondary_types. v0.3 candidates that shipped: user_engagement, last_engaged. v0.4 candidates that shipped: mechanism_pairings (binding-kind disambiguation). v0.5 candidates that shipped: paired_with deprecation + on-the-fly derivation (data-duplication elimination). v0.6 candidates that shipped: cross_vault_bindings relocation to a central file at agensy/cross-vault-bindings.yaml with self_declared + peer_views structure (eliminates write-amplification and the unratified-claim asymmetry). Reserved for v0.7: node quality/confidence, edge weight."

# ─────────────────────────────────────────────────────────────
# VALIDATION RULES
# Enforced by /system-audit. See universal-commands/system-audit.md.
# ─────────────────────────────────────────────────────────────
validation:
  - "Every node.category must be a key in node_categories."
  - "Every node.domain must exist in vault-config.md domains[].slug."
  - "Every node.engagement_positions value must exist in vault-config.md engagement_axis.positions[]."
  - "Every edge.type must be a key in edge_types."
  - "Every edge.from and edge.to must reference an existing node id in this vault."
  - "Every pattern.type must be a key in pattern_types."
  - "Every pattern.subgraph.nodes must reference existing node ids."
  - "Every pattern.subgraph.edges must reference existing edge ids."
  - "Every cross_vault_bindings[].bridge_id must exist in agensy/cross-vault-bridges.md."
  - "Every linked_notes path must resolve to an existing file in the vault."
  # v0.2 additions
  - "If present, pattern.timescale must be a key in timescale_bands."
  - "If present, flow-node.timescale must be a key in timescale_bands."
  - "If present, every entry in pattern.secondary_types must be a key in pattern_types and must not equal pattern.type."
  - "If present, pattern.subtype is a free string — no enum validation (emergent taxonomy)."
  # v0.2 audit-level (non-blocking): cross-vault bindings with type-mismatched paired patterns are flagged by /system-audit Step 5b as warnings.
  # v0.3 additions
  - "If present, user_engagement must be a key in user_engagement_states."
  - "If user_engagement is present, last_engaged must also be present and must be a valid YYYY-MM-DD date."
  - "If last_engaged is present without user_engagement, that is a schema violation (annotation half-applied)."
  # v0.4 additions
  - "If present, every mechanism_pairings[].local must reference an existing pattern id in this vault."
  - "If present, every mechanism_pairings[].peers entry must be a string of the form '<peer_vault>.<peer_pattern_id>' where <peer_vault> appears in the binding's paired_with dict (v0.4) OR has a binding for the same bridge_id (v0.5+ relaxation)."
  - "v0.4 audit-level (blocking): mechanism_pairings type-mismatch (without secondary_types escape) is the only condition that triggers Step 9 dirt-level RED via Step 5b. Cross-products of paired_with NOT in mechanism_pairings are presumed substrate-level and not type-checked."
  # v0.5 additions (apply ONLY to residual pre-v0.6 vaults)
  - "If a binding ships with explicit `paired_with`, that value is treated as authoritative for THIS vault's audit run. The audit additionally computes `paired_with_derived` from peer vaults' local_nodes / local_patterns for the same bridge_id, and surfaces the diff under informational class `paired_with_unratified` when the explicit value references nodes/patterns absent from the peer's local entries for this bridge_id."
  - "If a binding omits `paired_with` (the v0.5 recommended state), /system-audit Step 5 computes the effective paired_with on-the-fly by walking peer vaults' system-model.yaml and gathering their local_nodes / local_patterns for the same bridge_id. Peer vaults with no entry for this bridge_id contribute the empty set."
  - "v0.5 audit-level (informational): paired_with_unratified is a NEW warning class — does NOT contribute to the >5 dirt-level trigger and does NOT change red/yellow/green levels. Pure visibility surface."
  # v0.6 additions
  - "Cross-vault bindings live in agensy/cross-vault-bindings.yaml (governed by framework/system-model/cross-vault-bindings-schema.yaml). v0.6 vaults SHOULD omit `cross_vault_bindings:` from system-model.yaml; pre-v0.6 vaults that still carry the section remain valid but the central file takes precedence whenever a bridge_id appears there."
  - "v0.6 audit-level (informational): five v0.5 informational classes (paired_with_unratified, claims_about_me, bindings_safe_to_strip, bindings_selectivity_loss, bindings_mixed) collapse into one — `unratified_peer_views` — emitted from the central file. Does NOT affect dirt level."
  - "Mechanism pairings authored under v0.6 live at the bridge level in the central file with an explicit `claimer:` field. Pre-v0.6 mechanism_pairings inside per-vault bindings remain parseable but new authorship goes through the central file."

# ─────────────────────────────────────────────────────────────
# WHAT THE SYSTEM MODEL IS NOT
# Reuse constraints — referenced by system-model-architecture.md.
# ─────────────────────────────────────────────────────────────
reuse_constraints:
  not_a_restatement_of_vault_config:
    "system-model references vault-config domains and engagement_axis positions; does not duplicate."
  not_a_restatement_of_cross_vault_bridges:
    "cross_vault_bindings reference bridge_id; do not duplicate bridge descriptions."
  not_auto_generated:
    "v0.2 is hand-curated. Auto-regeneration from note frontmatter is v2 work."
  not_a_replacement_for_theorist_maps:
    "Theorist maps index a single thinker's logic. system-model indexes the domain's structural ontology."
