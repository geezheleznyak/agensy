# system-model-schema.yaml
# Canonical schema for the Vault System Model Layer — v0.3
# Per-vault [vault]/system-model.yaml files extend this file via `extends:`.
# Vocabulary frozen from the Phase 0 primitive-discovery experiment
# (see framework/system-model/primitives-experiment.md, 2026-04-20).
# v0.2 additions (2026-04-24) and v0.3 additions (2026-04-24) are all additive;
# v0.1 and v0.2 YAMLs remain valid.

schema:
  name: vault-system-model
  version: "0.3"
  created: 2026-04-20
  updated: 2026-04-24
  source_experiment: framework/system-model/primitives-experiment.md
  v0_2_motivation: >
    Closure gates from Phase 2 (kratos) and Phase 4 (oikos+belli) identified four
    caveats that v0.1 did not capture: (1) patterns span wildly different timescales
    so cross-vault queries were category-blind; (2) `reflexivity` conflated ≥4
    mechanically distinct sub-types observed across vaults; (3) accumulation and
    path_dependence have fuzzy boundaries with genuinely dual cases; (4) bindings
    were hand-asserted with no mechanism check. v0.2 adds optional fields to address
    1–3 and extends /system-audit to address 4.
  v0_3_motivation: >
    The Learner Layer (framework/principles/learner-layer-architecture.md, 2026-04-24)
    needs per-node user-traversal annotation so /what-next can do readiness checks
    and /curriculum (Phase C) can identify the boundary between mastered and
    unmastered concepts. v0.3 adds two optional fields (`user_engagement` enum,
    `last_engaged` date) to nodes AND patterns. Sparse by default — annotate
    only nodes the user has actually engaged with. Default is implicitly `unseen`;
    do not pre-fill the YAML with `unseen` markers.

# ─────────────────────────────────────────────────────────────
# NODE VOCABULARY — 6 categories
# Each node belongs to exactly one category.
# Categories partition the ontology — not types but kinds of thing.
# ─────────────────────────────────────────────────────────────
node_categories:
  agents:       "Loci of decision/action with interests."
  states:       "Conditions persisting until changed (stocks)."
  flows:        "Rates of change of states."
  signals:      "Information carrying content between agents/states."
  constraints:  "Boundaries that foreclose possibilities."
  structures:   "Persistent configurations of roles and relations."

# ─────────────────────────────────────────────────────────────
# NODE REQUIRED FIELDS
# ─────────────────────────────────────────────────────────────
node_required_fields:
  - id                      # Unique within vault. Lowercase, snake_case.
  - label                   # Human-readable name.
  - category                # One of node_categories.
  - domain                  # Must exist in vault-config.md domains[].slug.
  - engagement_positions    # List from vault-config engagement_axis.positions.
  - linked_notes            # List of note paths relative to vault root.

node_optional_fields:
  - theorists               # Theorists whose maps discuss this node.
  - related_nodes           # Cross-references within the vault.
  - quality                 # v0.3 candidate: uncertainty/confidence attribute.
  - notes                   # Free-text clarification.
  - timescale               # (v0.2, flows only) — see timescale_bands below.
  - user_engagement         # (v0.3) — see user_engagement_states below. Sparse.
  - last_engaged            # (v0.3) — YYYY-MM-DD. Required if user_engagement is set.

# ─────────────────────────────────────────────────────────────
# EDGE VOCABULARY — 5 core + 5 reserve
# Edges connect two nodes with a typed, directed relation.
# ─────────────────────────────────────────────────────────────
edge_types:
  # Core set — empirically dominant across all three Phase 0 decompositions.
  produces:    "`from` generates or causes `to`."
  reinforces:  "`from` amplifies or stabilizes `to`."
  dampens:     "`from` suppresses or reduces `to`."
  gates:       "`from` is a threshold/condition that enables or blocks `to`."
  couples:     "`from` makes `to` dependent on a third element."
  # Reserve set — plausibly real; retained pending broader corpus evidence.
  consumes:    "`from` depletes or transforms `to`."
  reveals:     "`from` makes `to` observable."
  conceals:    "`from` hides or obfuscates `to`."
  requires:    "`from` depends on `to` for its operation."
  opposes:     "`from` and `to` are in structural antagonism."

edge_required_fields:
  - id                      # Unique within vault. For reference from patterns.
  - from                    # Node id.
  - to                      # Node id.
  - type                    # One of edge_types.
  - linked_notes            # Notes that discuss this edge. May be empty.

edge_optional_fields:
  - weight                  # v0.3 candidate: edge strength/certainty.
  - conditions              # Scope conditions under which the edge applies.

# ─────────────────────────────────────────────────────────────
# PATTERN VOCABULARY — 7 types
# Patterns are dynamical shapes instantiated by subgraphs (nodes + edges).
# The pattern layer is what enables cross-vault composition:
# the same pattern type in two vaults, with different local nodes,
# is the coupling unit for cross_vault_bindings.
# ─────────────────────────────────────────────────────────────
pattern_types:
  positive_feedback:  "Self-amplifying loop — output reinforces input."
  negative_feedback:  "Self-limiting loop — output dampens input."
  threshold:          "Sudden qualitative transition at a critical value."
  reflexivity:        "System's model of itself affects the system."
  selection:          "Differential persistence of competing units."
  accumulation:       "Stock grows without a balancing release."
  path_dependence:    "History constrains present options."

pattern_required_fields:
  - id                      # Unique within vault. Lowercase, snake_case.
  - type                    # One of pattern_types.
  - subgraph                # { nodes: [node_id...], edges: [edge_id...] }
  - linked_notes            # Notes that analyze this pattern instance.

pattern_optional_fields:
  - theorists               # Theorists whose maps discuss this pattern.
  - description             # Natural-language characterization.
  - timescale               # (v0.2) — see timescale_bands below.
  - subtype                 # (v0.2) — free-string sub-classification. Emergent.
  - secondary_types         # (v0.2) — additional pattern_types this instance also exhibits.
  - domain                  # (v0.2, observational) — many vault models already set this.
  - user_engagement         # (v0.3) — see user_engagement_states below. Sparse.
  - last_engaged            # (v0.3) — YYYY-MM-DD. Required if user_engagement is set.

# ─────────────────────────────────────────────────────────────
# TIMESCALE BANDS (v0.2) — six coarse buckets
# Applied optionally to patterns (dynamical shape) and flows (rates).
# Coarse by design — fine-grained timescales invite false precision
# while providing no additional cross-vault query power.
# ─────────────────────────────────────────────────────────────
timescale_bands:
  seconds-to-minutes:  "Combat tempo, conversational signaling, micro-market price formation."
  hours-to-days:       "Operational tempo, news cycles, short-run market reactions."
  weeks-to-months:     "Campaign horizons, business cycles, policy-response cycles."
  years:               "Electoral cycles, regime consolidation, technology adoption S-curves."
  decades+:            "Institutional lock-in, demographic transition, civilizational shifts."
  mixed:               "Genuinely spans multiple bands — explicit acknowledgment, not a default."

# Convention: use `mixed` only when the pattern's mechanism operates across bands.
# Prefer the slowest band over `mixed` when one band dominates.

# ─────────────────────────────────────────────────────────────
# SECONDARY TYPES (v0.2) — dual-mechanism patterns
# Use for patterns that genuinely exhibit two pattern_types (e.g., capital
# accumulation that also forecloses future options is both `accumulation` and
# `path_dependence`). Primary `type` is authoritative; `secondary_types` surface
# the pattern in additional queries.
# ─────────────────────────────────────────────────────────────
secondary_types_rule:
  - "A pattern's primary `type` is authoritative — used for the pattern count and default query."
  - "`secondary_types` is an OPTIONAL array of other pattern_types this instance also exhibits."
  - "Use sparingly. If every pattern looks dual, the primary vocabulary is too vague."
  - "A secondary_types tag must be justified by the same subgraph — do not add a type whose mechanism isn't in the subgraph."

# ─────────────────────────────────────────────────────────────
# USER ENGAGEMENT STATES (v0.3) — four-state mastery ladder
# Per-node and per-pattern annotation of the user's traversal of this concept.
# Sparse by default — annotate only nodes/patterns the user has actually
# engaged with. Default for unannotated entries is implicitly `unseen`;
# do NOT pre-fill the YAML with `unseen` markers.
# Used by /what-next (readiness check), /positions (mastery annotation),
# and /curriculum + /teach + /recall (Phase C).
# Canonical declaration: framework/principles/learner-layer-architecture.md
# ─────────────────────────────────────────────────────────────
user_engagement_states:
  unseen:    "Node exists in domain model; user has not engaged with the concept."
  surfaced:  "User encountered in dialogue or note; no working understanding yet."
  applied:   "User has used the concept in their own writing or argument."
  mastered:  "User can teach it, contest it, extend it."

# Convention: state transitions are normally monotonic upward
# (unseen → surfaced → applied → mastered). Downward transitions are allowed
# (mastery decays) but should be annotated with a brief rationale in `notes`.
# Expected steady-state annotation density: 10–30% of nodes, NOT 100%.

# ─────────────────────────────────────────────────────────────
# CROSS-VAULT BINDINGS
# Link a local pattern or node-set to a bridge_id in
# synthesis-meta/cross-vault-bridges.md and its peer-vault counterpart.
# ─────────────────────────────────────────────────────────────
cross_vault_bindings_required_fields:
  - bridge_id               # Must exist in synthesis-meta/cross-vault-bridges.md.
  - local_nodes             # List of node ids in this vault.
  - paired_with             # Dict: { [vault_name]: { nodes: [...], patterns: [...] } }

cross_vault_bindings_optional_fields:
  - local_patterns          # List of pattern ids on this side of the bridge.
  - notes                   # Free-text characterization of the binding.

# ─────────────────────────────────────────────────────────────
# EXTENSIBILITY
# Per-vault extensions are allowed and vault-scoped.
# Schema-level additions (new categories, edge types, pattern types)
# are reserved for v0.3 after broader corpus evidence accumulates.
# ─────────────────────────────────────────────────────────────
extensibility:
  per_vault_extensions:
    allowed: true
    scope: "vault-local only; not binding across cross_vault_bindings"
    mechanism: "Declare under an `extensions:` block in the vault's system-model.yaml"
  schema_level_additions:
    allowed: false
    note: "v0.2 candidates that shipped: timescale, subtype, secondary_types. v0.3 candidates that shipped: user_engagement, last_engaged. Reserved for v0.4: node quality/confidence, edge weight."

# ─────────────────────────────────────────────────────────────
# VALIDATION RULES
# Enforced by /system-audit. See universal-commands/system-audit.md.
# ─────────────────────────────────────────────────────────────
validation:
  - "Every node.category must be a key in node_categories."
  - "Every node.domain must exist in vault-config.md domains[].slug."
  - "Every node.engagement_positions value must exist in vault-config.md engagement_axis.positions[]."
  - "Every edge.type must be a key in edge_types."
  - "Every edge.from and edge.to must reference an existing node id in this vault."
  - "Every pattern.type must be a key in pattern_types."
  - "Every pattern.subgraph.nodes must reference existing node ids."
  - "Every pattern.subgraph.edges must reference existing edge ids."
  - "Every cross_vault_bindings[].bridge_id must exist in synthesis-meta/cross-vault-bridges.md."
  - "Every linked_notes path must resolve to an existing file in the vault."
  # v0.2 additions
  - "If present, pattern.timescale must be a key in timescale_bands."
  - "If present, flow-node.timescale must be a key in timescale_bands."
  - "If present, every entry in pattern.secondary_types must be a key in pattern_types and must not equal pattern.type."
  - "If present, pattern.subtype is a free string — no enum validation (emergent taxonomy)."
  # v0.2 audit-level (non-blocking): cross-vault bindings with type-mismatched paired patterns are flagged by /system-audit Step 5b as warnings.
  # v0.3 additions
  - "If present, user_engagement must be a key in user_engagement_states."
  - "If user_engagement is present, last_engaged must also be present and must be a valid YYYY-MM-DD date."
  - "If last_engaged is present without user_engagement, that is a schema violation (annotation half-applied)."

# ─────────────────────────────────────────────────────────────
# WHAT THE SYSTEM MODEL IS NOT
# Reuse constraints — referenced by system-model-architecture.md.
# ─────────────────────────────────────────────────────────────
reuse_constraints:
  not_a_restatement_of_vault_config:
    "system-model references vault-config domains and engagement_axis positions; does not duplicate."
  not_a_restatement_of_cross_vault_bridges:
    "cross_vault_bindings reference bridge_id; do not duplicate bridge descriptions."
  not_auto_generated:
    "v0.2 is hand-curated. Auto-regeneration from note frontmatter is v2 work."
  not_a_replacement_for_theorist_maps:
    "Theorist maps index a single thinker's logic. system-model indexes the domain's structural ontology."
